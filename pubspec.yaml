name: hrm_erp
description: Employee Management ERP + CRM + Payroll (Flutter + Supabase)
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.3.0

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # UI
  fl_chart: ^0.67.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.12.0
  geolocator: ^13.0.0
  local_auth: ^3.0.0

  # Utilities
  intl: ^0.19.0
  google_fonts: ^7.1.0
  uuid: ^4.3.3
  image_picker: ^1.0.7
  file_picker: 10.3.8
  url_launcher: ^6.2.5

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#6366F1"
    theme_color: "#6366F1"
