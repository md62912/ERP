name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-web:
    name: Build Flutter Web → GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Ensure platform scaffolds exist
        run: flutter create --platforms=web,android .

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Apply branding to web scaffold
        run: |
          sed -i 's/<title>.*<\/title>/<title>Xebec Trading Services - HRM ERP<\/title>/' web/index.html
          sed -i 's/"name": ".*"/"name": "Xebec Trading Services HRM ERP"/' web/manifest.json
          sed -i 's/"short_name": ".*"/"short_name": "Xebec ERP"/' web/manifest.json
          # iOS "Add to Home Screen" reads these Apple-specific meta tags
          # directly (not the web manifest) to decide the home-screen icon
          # label and whether it launches full-screen without Safari's
          # browser chrome. Flutter's default template already includes
          # them, defaulted to the raw project name -- patch that to the
          # real brand name, same as the Android launcher label and web
          # <title> above.
          sed -i 's/apple-mobile-web-app-title" content=".*"/apple-mobile-web-app-title" content="Xebec ERP"/' web/index.html
          sed -i 's/name="theme-color" content="#[0-9A-Fa-f]*"/name="theme-color" content="#6366F1"/' web/index.html

      - name: Build web
        run: flutter build web --release --base-href /${{ github.event.repository.name }}/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy-web:
    name: Deploy to GitHub Pages
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  build-android:
    name: Build Android APK → GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Ensure platform scaffolds exist
        run: flutter create --platforms=android,web .

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Ensure INTERNET, location, and biometric permissions are declared
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q 'android.permission.INTERNET' "$MANIFEST"; then
            sed -i '/<application/i\    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST"
            echo "Added missing INTERNET permission"
          else
            echo "INTERNET permission already present"
          fi
          if ! grep -q 'android.permission.ACCESS_FINE_LOCATION' "$MANIFEST"; then
            sed -i '/<application/i\    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' "$MANIFEST"
            sed -i '/<application/i\    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' "$MANIFEST"
            echo "Added missing location permissions"
          else
            echo "Location permissions already present"
          fi
          if ! grep -q 'android.permission.USE_BIOMETRIC' "$MANIFEST"; then
            sed -i '/<application/i\    <uses-permission android:name="android.permission.USE_BIOMETRIC" />' "$MANIFEST"
            echo "Added missing USE_BIOMETRIC permission"
          else
            echo "USE_BIOMETRIC permission already present"
          fi
          cat "$MANIFEST"

      - name: Switch MainActivity to FlutterFragmentActivity (required by local_auth)
        run: |
          MAINACTIVITY=$(find android/app/src/main/kotlin -name "MainActivity.kt")
          echo "Patching $MAINACTIVITY"
          sed -i 's/FlutterActivity/FlutterFragmentActivity/g' "$MAINACTIVITY"
          cat "$MAINACTIVITY"

      - name: Apply branding to Android scaffold
        run: |
          sed -i 's/android:label="[^"]*"/android:label="Xebec ERP"/' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: flutter build apk --release

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
